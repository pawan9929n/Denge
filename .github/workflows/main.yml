name: Run Telegram Bot

on:
  push:
    branches: [ main ]          # Triggers on push to main branch
  workflow_dispatch:             # Allows manual trigger from Actions tab
  schedule:
    - cron: '0 */5 * * *'        # Restart every 5 hours (optional, to bypass 6h limit)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI pymongo requests certifi aiohttp pytz psutil

      - name: Make danger binary executable
        run: chmod +x ./ultra.c     # Assumes 'danger' is in repo root

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          # Replace hardcoded values with environment variables (optional)
          # You can modify Danger.py to read from os.getenv() instead of hardcoding.
          python Danger.py
